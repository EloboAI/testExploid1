name: Dispatch Push Test
on:
  repository_dispatch:
    types: [push-bypass]

permissions:
  contents: write

jobs:
  push-to-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Create canary file
        run: |
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
          echo "GITHUB_TOKEN BYPASS CANARY" > canary_actions_${TIMESTAMP}.txt
          echo "Triggered by: repository_dispatch from FG token" >> canary_actions_${TIMESTAMP}.txt
          echo "GITHUB_ACTOR: $GITHUB_ACTOR" >> canary_actions_${TIMESTAMP}.txt
          echo "Event payload: ${{ toJSON(github.event.client_payload) }}" >> canary_actions_${TIMESTAMP}.txt
      
      - name: Commit and push with GITHUB_TOKEN
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "[GITHUB_TOKEN] Bypass via repository_dispatch $(date -u)"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
